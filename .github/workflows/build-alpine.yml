name: Build Alpine Pi Image
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable ARM emulation
        run: |
          docker run --privileged --rm multiarch/qemu-user-static --persistent yes

      - name: Build image
        timeout-minutes: 15
        run: |
          chmod +x input/image.sh
          mkdir -p output
          docker run --rm \
            -v $PWD/input:/input \
            -v $PWD/output:/output \
            -e ARCH=armv7 \
            -e SIMPLE_IMAGE=yes \
            -e VERBOSE=1 \
            ghcr.io/raspi-alpine/builder
          ls output/
          ls

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: output/*.img.gz
