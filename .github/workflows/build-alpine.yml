name: Build Alpine Pi Image

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable ARM emulation
        run: |
          docker run --rm --privileged tonistiigi/binfmt --install arm

      - name: Download Alpine Pi image
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/armv7/alpine-rpi-3.23.3-armv7.tar.gz
          mkdir -p rootfs
          tar -xzf alpine-rpi-3.23.3-armv7.tar.gz -C rootfs

      - name: Install packages and build apkovl
        run: |
          mkdir -p output

          docker run --rm \
            --platform linux/arm/v7 \
            --privileged \
            -v $(pwd)/output:/output \
            arm32v7/alpine \
            sh -c "
              apk update
              apk add --no-cache \
                gnupg \
                gpg-agent \
                gnupg-dirmngr \
                gnupg-scdaemon \
                cryptsetup \
                e2fsprogs \
                pcsc-lite \
                pcsc-lite-libs \
                pcsc-lite-openrc \
                ccid \
                pinentry \
                yubikey-manager \
                ykpers

              # Save installed package list
              cp /etc/apk/world /output/world

              # Export all installed files as apkovl
              cd /
              tar -czf /output/localhost.apkovl.tar.gz \
                etc/apk/world \
                etc/apk/protected_paths.d \
                usr/bin/gpg \
                usr/bin/gpg2 \
                usr/bin/gpg-agent \
                usr/bin/gpgconf \
                usr/bin/gpgsm \
                usr/bin/gpgv \
                usr/bin/ykman \
                usr/bin/ykpers \
                usr/lib/gnupg \
                usr/lib/engines-3 \
                usr/share/gnupg \
                usr/lib/libgpg-error.so.0 \
                usr/lib/libgcrypt.so.20 \
                usr/lib/libassuan.so.0 \
                usr/lib/libksba.so.8 \
                usr/lib/libnpth.so.0 \
                lib/libcryptsetup.so.12 \
                lib/libdevmapper.so.1.02 \
                sbin/cryptsetup \
                sbin/e2fsck \
                sbin/mkfs.ext2 \
                usr/lib/pcsc \
                usr/sbin/pcscd
            "

      - name: Inject apkovl and gpg configs into image
        run: |
          # Place apkovl into rootfs
          cp output/localhost.apkovl.tar.gz rootfs/

          # Also download packages for airgap cache
          mkdir -p rootfs/apks/armv7
          docker run --rm \
            --platform linux/arm/v7 \
            -v $(pwd)/rootfs/apks/armv7:/packages \
            arm32v7/alpine \
            sh -c "
              apk update
              apk fetch -R --no-cache -o /packages \
                gnupg gpg-agent gnupg-dirmngr gnupg-scdaemon \
                cryptsetup e2fsprogs pcsc-lite pcsc-lite-libs \
                pcsc-lite-openrc ccid pinentry \
                yubikey-manager ykpers

              # Build local index
              apk index --allow-untrusted \
                -o /packages/APKINDEX.tar.gz \
                /packages/*.apk
            "

          # Set up repositories to point at local cache
          mkdir -p apkovl/etc/apk
          echo '/media/mmcblk0p1/apks' > apkovl/etc/apk/repositories

          # GPG configs
          mkdir -p apkovl/root/.gnupg
          cat > apkovl/root/.gnupg/gpg.conf << 'EOF'
          personal-cipher-preferences AES256 AES192 AES
          personal-digest-preferences SHA512 SHA384 SHA256
          personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
          default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed
          cert-digest-algo SHA512
          s2k-digest-algo SHA512
          s2k-cipher-algo AES256
          charset utf-8
          fixed-list-mode
          no-comments
          no-emit-version
          keyid-format 0xlong
          list-options show-uid-validity
          verify-options show-uid-validity
          with-fingerprint
          require-cross-certification
          no-symkey-cache
          use-agent
          throw-keyids
          EOF
          
                    cat > apkovl/root/.gnupg/gpg-agent.conf << 'EOF'
          enable-ssh-support
          default-cache-ttl 60
          max-cache-ttl 120
          pinentry-program /usr/bin/pinentry
          EOF

          chmod 700 apkovl/root/.gnupg
          chmod 600 apkovl/root/.gnupg/gpg.conf
          chmod 600 apkovl/root/.gnupg/gpg-agent.conf

          # Merge into apkovl
          cd apkovl
          tar -czf ../rootfs/localhost.apkovl.tar.gz .

      - name: Repack image
        run: |
          tar -czf alpine-rpi-custom.tar.gz -C rootfs .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: alpine-rpi-custom.tar.gz
