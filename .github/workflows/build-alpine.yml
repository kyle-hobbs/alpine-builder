name: Build Alpine Pi Image

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm

      - name: Download Alpine Pi image
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/armv7/alpine-rpi-3.23.3-armv7.tar.gz

      - name: Extract image
        run: |
          mkdir -p rootfs
          tar -xzf alpine-rpi-3.23.3-armv7.tar.gz -C rootfs

      - name: Download packages for armv7
        run: |
          mkdir -p rootfs/apks/armv7
          docker run --rm \
            --platform linux/arm/v7 \
            -v $(pwd)/rootfs/apks/armv7:/packages \
            arm32v7/alpine \
            sh -c "apk update && \
              cp /var/cache/apk/*.tar.gz /packages/ && \
              apk fetch -R -o /packages \
              gnupg \
              gnupg-dirmngr \
              gpg-agent \
              gnupg-scdaemon \
              cryptsetup \
              e2fsprogs \
              pcsc-lite \
              pcsc-lite-libs \
              pcsc-lite-openrc \
              ccid \
              pinentry \
              yubikey-manager \
              ykpers"

      - name: Create apkovl with config files
        run: |
          mkdir -p apkovl/etc/apk
          mkdir -p apkovl/root/.gnupg

          cat > apkovl/etc/apk/world << 'EOF'
          gnupg
          gnupg-dirmngr
          gpg-agent
          gnupg-scdaemon
          cryptsetup
          e2fsprogs
          pcsc-lite
          pcsc-lite-libs
          pcsc-lite-openrc
          ccid
          pinentry
          yubikey-manager
          ykpers
          EOF

          # Generate default gpg.conf
          cat > apkovl/root/.gnupg/gpg.conf << 'EOF'
          personal-cipher-preferences AES256 AES192 AES
          personal-digest-preferences SHA512 SHA384 SHA256
          personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
          default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed
          cert-digest-algo SHA512
          s2k-digest-algo SHA512
          s2k-cipher-algo AES256
          charset utf-8
          fixed-list-mode
          no-comments
          no-emit-version
          keyid-format 0xlong
          list-options show-uid-validity
          verify-options show-uid-validity
          with-fingerprint
          require-cross-certification
          no-symkey-cache
          use-agent
          throw-keyids
          EOF

          # Generate default gpg-agent.conf
          cat > apkovl/root/.gnupg/gpg-agent.conf << 'EOF'
          enable-ssh-support
          ttyname $GPG_TTY
          default-cache-ttl 60
          max-cache-ttl 120
          pinentry-program /usr/bin/pinentry
          EOF

          chmod 700 apkovl/root/.gnupg
          chmod 600 apkovl/root/.gnupg/gpg.conf
          chmod 600 apkovl/root/.gnupg/gpg-agent.conf

          cd apkovl
          tar -czf ../rootfs/localhost.apkovl.tar.gz .

      - name: Install packages into image
        run: |
          docker run --rm --privileged tonistiigi/binfmt --install arm

          docker run --rm \
            --platform linux/arm/v7 \
            --privileged \
            -v $(pwd)/rootfs:/rootfs \
            arm32v7/alpine \
            sh -c "
              # Install directly from local apk files, no index needed
              apk add --allow-untrusted --no-network \
                /rootfs/apks/armv7/*.apk

              # Save installed state
              cp /etc/apk/world /rootfs/apk-world
              tar -czf /rootfs/localhost.apkovl.tar.gz \
                etc/apk/world \
                lib/apk/db
            "
            
      - name: Repack image
        run: |
          tar -czf alpine-rpi-custom.tar.gz -C rootfs .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: alpine-rpi-custom.tar.gz
