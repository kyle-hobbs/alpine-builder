name: Build Alpine Pi Image
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable ARM emulation
        run: |
          docker run --privileged --rm multiarch/qemu-user-static --persistent yes

      - name: Download Alpine Pi tarball
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/armv7/alpine-rpi-3.21.7-armv7.tar.gz
          mkdir -p rootfs
          tar -xzf alpine-rpi-3.21.7-armv7.tar.gz -C rootfs

      - name: Install packages and build apkovl
        run: |
          mkdir -p output

          docker run --rm \
            --platform linux/arm/v7 \
            --privileged \
            -v $(pwd)/output:/output \
            arm32v7/alpine \
            sh -c "
              apk update
              apk add --no-cache \
                gnupg \
                gpg-agent \
                gnupg-dirmngr \
                gnupg-scdaemon \
                cryptsetup \
                e2fsprogs \
                pcsc-lite \
                pcsc-lite-libs \
                pcsc-lite-openrc \
                ccid \
                pinentry \
                yubikey-manager \
                ykpers

              apk info -L \
                gnupg gpg-agent gnupg-dirmngr gnupg-scdaemon \
                cryptsetup e2fsprogs pcsc-lite pcsc-lite-libs \
                pcsc-lite-openrc ccid pinentry \
                yubikey-manager ykpers \
                | grep -v 'contains:' \
                | grep -v '^$' \
                | grep -v '/$' > /tmp/filelist.txt

              echo 'etc/apk/world' >> /tmp/filelist.txt

              tar -czf /output/localhost.apkovl.tar.gz \
                -C / \
                --files-from=/tmp/filelist.txt
            "

          sudo chown -R $USER:$USER output/

      - name: Build apkovl etc config
        run: |
          mkdir -p apkovl/etc/apk
          mkdir -p apkovl/root/.gnupg

          echo 'root:root' | openssl passwd -6 -stdin | \
            awk '{print "root:"$1":0:0:root:/root:/bin/sh"}' \
            > apkovl/etc/shadow

          echo '/media/mmcblk0p1/apks' > apkovl/etc/apk/repositories

          cp input/apk-world apkovl/etc/apk/world
          cp input/gpg.conf apkovl/root/.gnupg/gpg.conf
          cp input/gpg-agent.conf apkovl/root/.gnupg/gpg-agent.conf

          chmod 700 apkovl/root/.gnupg
          chmod 600 apkovl/root/.gnupg/gpg.conf
          chmod 600 apkovl/root/.gnupg/gpg-agent.conf

          cd apkovl
          tar -czf ../output/localhost.apkovl.tar.gz .

      - name: Download packages for offline use
        run: |
          mkdir -p rootfs/apks/armv7

          docker run --rm \
            --platform linux/arm/v7 \
            -v $(pwd)/rootfs/apks/armv7:/packages \
            arm32v7/alpine \
            sh -c "
              apk update
              apk fetch -R --no-cache -o /packages \
                gnupg gpg-agent gnupg-dirmngr gnupg-scdaemon \
                cryptsetup e2fsprogs pcsc-lite pcsc-lite-libs \
                pcsc-lite-openrc ccid pinentry \
                yubikey-manager ykpers
              apk index \
                -o /packages/APKINDEX.tar.gz \
                /packages/*.apk
            "

      - name: Assemble final image
        run: |
          cp output/localhost.apkovl.tar.gz rootfs/
          tar -czf alpine-rpi-custom.tar.gz -C rootfs .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: alpine-rpi-custom.tar.gz
