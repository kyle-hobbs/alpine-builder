name: Build Alpine Pi Image
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Alpine Pi tarball
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/armv7/alpine-rpi-3.23.3-armv7.tar.gz
          mkdir -p rootfs
          tar -xzf alpine-rpi-3.23.3-armv7.tar.gz -C rootfs

          echo "=== ORIGINAL cmdline.txt ==="
          cat -A rootfs/cmdline.txt
          echo "=== ORIGINAL config.txt ==="
          cat rootfs/config.txt
          echo "=== original world ==="
          cat rootfs/etc/apk/world 2>/dev/null || echo "no world file"
          echo "=== rootfs root files ==="
          ls -la rootfs/

      - name: Enable ARM emulation
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install arm

      - name: Download and pre-install packages into rootfs
        run: |
          mkdir -p rootfs/apks/armv7

          # Wipe stale apk db on the HOST before Docker runs.
          # The tarball world pins 'vlan' which conflicts with ifupdown-ng.
          # We wipe it so apk starts completely fresh with no prior state.
          sudo rm -rf rootfs/lib/apk/db
          sudo rm -f rootfs/etc/apk/world

          docker run --rm \
            --platform linux/arm/v7 \
            --privileged \
            -v $(pwd)/rootfs:/mnt/rootfs \
            -v $(pwd)/rootfs/apks/armv7:/packages \
            arm32v7/alpine:3.23 \
            sh -c "
              set -e
              apk update

              # Strip vlan from container world and upgrade so container packages
              # match the mirror - prevents version skew during fetch
              sed -i '/^vlan$/d' /etc/apk/world
              apk fix 2>/dev/null || true
              apk upgrade --no-cache

              # Fetch ONLY our custom packages and their deps.
              # Do NOT fetch alpine-base/ifupdown-ng/network-extras/vlan -
              # those are the conflict chain. The tarball already has a working
              # base system; we only need to add our packages on top.
              apk fetch --recursive --no-cache -o /packages \
                gnupg \
                gnupg-dirmngr \
                gpg-agent \
                gnupg-scdaemon \
                cryptsetup \
                e2fsprogs \
                pcsc-lite \
                pcsc-lite-libs \
                pcsc-lite-openrc \
                ccid \
                pinentry \
                yubikey-manager \
                ykpers

              # Install into rootfs with --initdb (fresh db) but
              # with --force-broken-world so apk does not try to
              # re-resolve or reinstall base system packages
              apk add \
                --root /mnt/rootfs \
                --initdb \
                --allow-untrusted \
                --no-network \
                --force-broken-world \
                --repositories-file /dev/null \
                /packages/*.apk
            "
          sudo chown -R $USER:$USER rootfs/

      - name: Verify install
        run: |
          echo "=== /sbin/init exists? ==="
          ls -la rootfs/sbin/init
          echo "=== world file ==="
          cat rootfs/etc/apk/world 2>/dev/null || echo "no world file"
          echo "=== rootfs size ==="
          du -sh rootfs/
          echo "=== gnupg present? ==="
          ls rootfs/usr/bin/gpg 2>/dev/null && echo "YES" || echo "NO"
          echo "=== pcscd present? ==="
          ls rootfs/usr/sbin/pcscd 2>/dev/null && echo "YES" || echo "NO"

      - name: Patch boot config for Pi 2B diskless mode
        run: |
          # usercfg.txt is included by config.txt - safe place for our overrides
          cat > rootfs/usercfg.txt << 'EOF'
          kernel=boot/vmlinuz-rpi2
          initramfs boot/initramfs-rpi2
          enable_uart=1
          disable_overscan=1
          EOF
          sed -i 's/^[[:space:]]*//' rootfs/usercfg.txt

          EXISTING=$(tr -d '\n\r' < rootfs/cmdline.txt | sed 's/[[:space:]]*$//')
          CLEANED=$(echo "$EXISTING" \
            | sed 's/alpine_dev=[^ ]*//g' \
            | sed 's/apkovl=[^ ]*//g' \
            | sed 's/  */ /g' \
            | sed 's/[[:space:]]*$//')
          printf '%s alpine_dev=mmcblk0p1:vfat apkovl=localhost.apkovl.tar.gz\n' "$CLEANED" \
            > rootfs/cmdline.txt

          echo "=== PATCHED cmdline.txt ==="
          cat -A rootfs/cmdline.txt
          echo "=== config.txt ==="
          cat rootfs/config.txt
          echo "=== usercfg.txt ==="
          cat rootfs/usercfg.txt

      - name: Build apkovl
        run: |
          mkdir -p apkovl/etc/apk
          mkdir -p apkovl/etc/runlevels/default
          mkdir -p apkovl/root/.gnupg

          printf '/media/mmcblk0p1/apks\n' > apkovl/etc/apk/repositories

          cat > apkovl/etc/apk/world << 'EOF'
          alpine-base
          gnupg
          gnupg-dirmngr
          gpg-agent
          gnupg-scdaemon
          cryptsetup
          e2fsprogs
          pcsc-lite
          pcsc-lite-libs
          pcsc-lite-openrc
          ccid
          pinentry
          yubikey-manager
          ykpers
          EOF
          sed -i 's/^[[:space:]]*//' apkovl/etc/apk/world

          cat > apkovl/etc/passwd << 'EOF'
          root:x:0:0:root:/root:/bin/sh
          EOF
          sed -i 's/^[[:space:]]*//' apkovl/etc/passwd

          HASH=$(printf 'root' | openssl passwd -6 -stdin)
          printf "root:%s:0:0:99999:7:::\n" "$HASH" > apkovl/etc/shadow
          chmod 640 apkovl/etc/shadow

          touch apkovl/etc/runlevels/default/pcscd

          cat > apkovl/root/.gnupg/gpg.conf << 'EOF'
          personal-cipher-preferences AES256 AES192 AES
          personal-digest-preferences SHA512 SHA384 SHA256
          cert-digest-algo SHA512
          s2k-digest-algo SHA512
          s2k-cipher-algo AES256
          charset utf-8
          fixed-list-mode
          no-comments
          no-emit-version
          keyid-format 0xlong
          with-fingerprint
          require-cross-certification
          no-symkey-cache
          use-agent
          throw-keyids
          EOF
          sed -i 's/^[[:space:]]*//' apkovl/root/.gnupg/gpg.conf

          cat > apkovl/root/.gnupg/gpg-agent.conf << 'EOF'
          enable-ssh-support
          default-cache-ttl 60
          max-cache-ttl 120
          pinentry-program /usr/bin/pinentry
          EOF
          sed -i 's/^[[:space:]]*//' apkovl/root/.gnupg/gpg-agent.conf

          chmod 700 apkovl/root/.gnupg
          chmod 600 apkovl/root/.gnupg/gpg.conf apkovl/root/.gnupg/gpg-agent.conf

          cd apkovl
          tar -czf ../rootfs/localhost.apkovl.tar.gz .

          echo "=== apkovl contents ==="
          tar -tzf ../rootfs/localhost.apkovl.tar.gz

      - name: Assemble final image
        run: |
          tar -czf alpine-rpi-custom.tar.gz -C rootfs .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: alpine-rpi-custom.tar.gz
