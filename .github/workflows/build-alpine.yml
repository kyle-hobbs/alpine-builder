name: Build Alpine Pi Image

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable ARM emulation
        run: |
          docker run --privileged --rm multiarch/qemu-user-static --persistent yes

      - name: Create custom image script
        run: |
          mkdir -p input
          cat > input/image.sh << 'EOF'
          apk add --no-cache \
            gnupg \
            gpg-agent \
            gnupg-dirmngr \
            gnupg-scdaemon \
            cryptsetup \
            e2fsprogs \
            pcsc-lite \
            pcsc-lite-libs \
            pcsc-lite-openrc \
            ccid \
            pinentry \
            yubikey-manager \
            ykpers

          mkdir -p /root/.gnupg
          chmod 700 /root/.gnupg

          cat > /root/.gnupg/gpg.conf << 'GPGCONF'
          personal-cipher-preferences AES256 AES192 AES
          personal-digest-preferences SHA512 SHA384 SHA256
          cert-digest-algo SHA512
          charset utf-8
          fixed-list-mode
          no-comments
          no-emit-version
          keyid-format 0xlong
          use-agent
          throw-keyids
          GPGCONF

          cat > /root/.gnupg/gpg-agent.conf << 'AGENTCONF'
          enable-ssh-support
          default-cache-ttl 60
          max-cache-ttl 120
          pinentry-program /usr/bin/pinentry
          AGENTCONF

          chmod 600 /root/.gnupg/gpg.conf
          chmod 600 /root/.gnupg/gpg-agent.conf
          EOF
          chmod +x input/image.sh

      - name: Build image
        run: |
          mkdir -p output
          docker run --rm \
            -v $PWD/input:/input \
            -v $PWD/output:/output \
            -e CPU=armv7 \
            ghcr.io/raspi-alpine/builder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: output/sdcard.img.gz
