name: Build Alpine Pi Image

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm

      - name: Download Alpine Pi image
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/armv7/alpine-rpi-3.23.3-armv7.tar.gz

      - name: Extract image
        run: |
          mkdir -p rootfs
          tar -xzf alpine-rpi-3.23.3-armv7.tar.gz -C rootfs

      - name: Download specific packages for armv7
        run: |
          mkdir -p rootfs/apks/armv7
          
          # Download only what we need with dependencies
          docker run --rm \
            -v $(pwd)/rootfs/apks/armv7:/packages \
            arm32v7/alpine \
            sh -c "apk fetch -R -o /packages openssl vim"

      - name: Create apkovl
        run: |
          mkdir -p apkovl/etc/apk
          echo -e "openssl\nvim" > apkovl/etc/apk/world
          cd apkovl
          tar -czf ../rootfs/localhost.apkovl.tar.gz .

      - name: Repack image
        run: |
          tar -czf alpine-rpi-custom.tar.gz -C rootfs .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rpi-custom
          path: alpine-rpi-custom.tar.gz
